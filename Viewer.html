<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더빙 아카이브 & 데이터베이스</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Phosphor Icons (더빙 오프닝 탭에서 사용) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap');
        
        /* 모달 활성화 시 스크롤바 강제 공간 유지로 레이아웃 흔들림(쉬프트) 원천 차단 */
        html { scrollbar-gutter: stable; }
        
        body { font-family: 'Pretendard', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .content-vis-auto {
            content-visibility: auto;
            contain-intrinsic-size: 100% 320px;
        }

        @keyframes subtleFadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card-in {
            animation: subtleFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* 보기 전환 스위치용 애니메이션 */
        .switch-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 min-h-screen pb-12 antialiased">

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- 대형 메인 탭 네비게이션 헤더 -->
        <header class="mb-6 border-b border-slate-100 pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <p class="text-xs font-medium text-slate-400">판권 유무 및 서브컬쳐 가수 목록 정리</p>
            </div>
            
            <div class="flex flex-col md:flex-row items-center gap-4">
                <!-- 통합 메인 탭 컨트롤 -->
                <div class="bg-slate-100 p-1 rounded-xl flex gap-1 border border-slate-200/60 w-fit">
                    <button onclick="switchMainTab('rights')" id="mainTabRights" class="px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-slate-200 bg-white text-slate-950 shadow-xs">
                        더빙 판권 목록
                    </button>
                    <button onclick="switchMainTab('openings')" id="mainTabOpenings" class="px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-transparent text-slate-500 hover:text-slate-800 hover:bg-white/50">
                        한국 서브컬쳐/더빙 가수 DB
                    </button>
                </div>
            </div>
        </header>

        <!-- ==================== [탭 1] 더빙 판권 목록 영역 ==================== -->

                </aside>

                <div class="flex-grow">

    <!-- ==================== [스크립트 통합 제어] ==================== -->
    <script>
        function escapeHtml(value = '') {
            return String(value).replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        // 전역 메인 탭 제어 함수
        function switchMainTab(tab) {
            const rightsPane = document.getElementById('mainPaneRights');
            const openingsPane = document.getElementById('mainPaneOpenings');
            const rightsBtn = document.getElementById('mainTabRights');
            const openingsBtn = document.getElementById('mainTabOpenings');
            
            if (tab === 'rights') {
                rightsPane.classList.remove('hidden');
                openingsPane.classList.add('hidden');
                
                rightsBtn.className = "px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-slate-200 bg-white text-slate-950 shadow-xs";
                openingsBtn.className = "px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-transparent text-slate-500 hover:text-slate-800 hover:bg-white/50";
            } else {
                rightsPane.classList.add('hidden');
                openingsPane.classList.remove('hidden');
                
                openingsBtn.className = "px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-slate-200 bg-white text-slate-950 shadow-xs";
                rightsBtn.className = "px-5 py-2 text-xs font-semibold rounded-lg transition-all duration-150 cursor-pointer border border-transparent text-slate-500 hover:text-slate-800 hover:bg-white/50";
                
                // 오프닝 데이터가 아직 빈 배열이면 데이터를 로드합니다.
                if (SINGER_DATA.length === 0) {
                    fetchGitHubOpeningsData();
                }
            }
        }

        // 공통 모달 닫기 제어 함수 (매개변수로 id 전달)
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ==================== [파트 1: 더빙 판권 목록 로직] ====================
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/lsaac55151/kor-dub/refs/heads/main/dub_list.json';

        let itemData = [];
        let currentStatus = 'all';
        let currentChosung = 'all';
        let searchTimeout = null;
        
        let currentPage = 1;
        const itemsPerPage = 40;

        function debouncedSearch() {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                resetPageAndRender();
            }, 250);
        }

        const CHOSUNG_LIST = ['all', 'ㄱ', 'ㄴ', 'ㄷ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅅ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ', 'A-Z', '기타'];
        const CHOSUNG_NAMES = { 'all': '전체', 'A-Z': 'A-Z', '기타': '기타' };

        function getChosung(str) {
            if (!str) return '기타';
            const charCode = str.trim().charCodeAt(0);
            if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                const choIndex = Math.floor((charCode - 0xAC00) / 28 / 21);
                const choList = ['ㄱ', 'ㄱ', 'ㄴ', 'ㄷ', 'ㄷ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅂ', 'ㅅ', 'ㅅ', 'ㅇ', 'ㅈ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
                return choList[choIndex];
            }
            const char = str.trim().charAt(0);
            if (['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'].includes(char)) return char;
            if (['ㄲ'].includes(char)) return 'ㄱ';
            if (['ㄸ'].includes(char)) return 'ㄷ';
            if (['ㅃ'].includes(char)) return 'ㅂ';
            if (['ㅆ'].includes(char)) return 'ㅅ';
            if (['ㅉ'].includes(char)) return 'ㅈ';
            if (/[a-zA-Z]/.test(char)) return 'A-Z';
            return '기타';
        }

        function getAllChosungs(str) {
            if (!str) return [];
            const chosungs = [];
            for (let i = 0; i < str.length; i++) {
                const charCode = str.charCodeAt(i);
                if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                    const choIndex = Math.floor((charCode - 0xAC00) / 28 / 21);
                    const choList = ['ㄱ', 'ㄱ', 'ㄴ', 'ㄷ', 'ㄷ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅂ', 'ㅅ', 'ㅅ', 'ㅇ', 'ㅈ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
                    chosungs.push(choList[choIndex]);
                } else {
                    const char = str.charAt(i);
                    if (['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'].includes(char)) {
                        chosungs.push(char);
                    } else if (['ㄲ'].includes(char)) {
                        chosungs.push('ㄱ');
                    } else if (['ㄸ'].includes(char)) {
                        chosungs.push('ㄷ');
                    } else if (['ㅃ'].includes(char)) {
                        chosungs.push('ㅂ');
                    } else if (['ㅆ'].includes(char)) {
                        chosungs.push('ㅅ');
                    } else if (['ㅉ'].includes(char)) {
                        chosungs.push('ㅈ');
                    }
                }
            }
            return chosungs;
        }

        function renderChosungSidebar() {
            const container = document.getElementById('chosungSidebar');
            container.innerHTML = '';
            CHOSUNG_LIST.forEach(cho => {
                const label = CHOSUNG_NAMES[cho] || cho;
                const button = document.createElement('button');
                button.type = 'button';
                button.onclick = () => { currentChosung = cho; renderChosungSidebar(); resetPageAndRender(); };
                button.innerText = label;
                if (currentChosung === cho) {
                    button.className = "px-2 py-1.5 rounded-md text-xs font-semibold bg-slate-900 text-white border border-transparent cursor-pointer text-center lg:text-left lg:px-3 transition-all duration-150";
                } else {
                    button.className = "px-2 py-1.5 rounded-md text-xs font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-100 border border-transparent cursor-pointer text-center lg:text-left lg:px-3 transition-all duration-150";
                }
                container.appendChild(button);
            });
        }

        async function fetchData() {
            try {
                const cacheBuster = `?t=${new Date().getTime()}`;
                const response = await fetch(GITHUB_RAW_URL + cacheBuster);
                if (!response.ok) throw new Error('네트워크 응답 문제');
                const rawData = await response.json();
                itemData = rawData.map(item => ({
                    ...item,
                    _searchTitle: (item.title || item.name || '').toLowerCase().replace(/\s+/g, ''),
                }));
                itemData.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
            } catch (error) {
                console.log("데이터 로드 실패 - 빈 배열로 시작합니다.");
                itemData = [];
            } finally {
                document.getElementById('loading').classList.add('hidden');
                renderChosungSidebar();
                updateDataState();
            }
        }

        function updateStats() {
            const total = itemData.length;
            const active = itemData.filter(item => item.status === 'active').length;
            const expired = itemData.filter(item => item.status === 'expired').length;
            const bddvd = itemData.filter(item => item.status === 'bddvd').length;
            const vhs = itemData.filter(item => item.status === 'vhs').length;
            const excavated = itemData.filter(item => item.status !== 'active' && item.isExcavated).length;
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statExpired').innerText = expired;
            document.getElementById('statBddvd').innerText = bddvd;
            document.getElementById('statVhs').innerText = vhs;
            document.getElementById('statExcavated').innerText = excavated;
        }

        function updateDataState() {
            updateStats();
            renderData();
        }

        function filterStatus(status) {
            currentStatus = status;
            ['all', 'active', 'expired', 'bddvd', 'vhs', 'excavated'].forEach(s => {
                const tab = document.getElementById(`tab-${s}`);
                if (s === status) {
                    tab.className = "px-3 py-1.5 rounded text-xs font-semibold bg-white text-slate-950 border border-slate-200 cursor-pointer transition-all duration-150";
                } else {
                    tab.className = "px-3 py-1.5 rounded text-xs font-semibold text-slate-500 hover:text-slate-800 hover:bg-white/50 cursor-pointer border border-transparent transition-all duration-150";
                }
            });
            resetPageAndRender();
        }

        function resetPageAndRender() {
            currentPage = 1;
            renderData();
        }

        function renderData() {
            const rawSearchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const spaceFreeQuery = rawSearchQuery.replace(/\s+/g, ''); 
            const categoryFilter = document.getElementById('categoryFilter').value;
            const grid = document.getElementById('cardGrid');
            
            let filtered = itemData.filter(item => {
                const matchesStatus = (currentStatus === 'all' || (currentStatus === 'excavated' ? (item.status !== 'active' && item.isExcavated) : item.status === currentStatus));
                const matchesCategory = (categoryFilter === 'all' || item.category === categoryFilter);
                const matchesSearch = item._searchTitle.includes(spaceFreeQuery);
                
                let matchesChosung = false;
                if (currentChosung === 'all') {
                    matchesChosung = true;
                } else if (currentChosung === 'A-Z') {
                    matchesChosung = getChosung(item.title) === 'A-Z';
                } else if (currentChosung === '기타') {
                    matchesChosung = getChosung(item.title) === '기타';
                } else {
                    const firstCho = getChosung(item.title);
                    const allChos = getAllChosungs(item.title);
                    matchesChosung = (firstCho === currentChosung || allChos.includes(currentChosung));
                }
                return matchesStatus && matchesCategory && matchesChosung && matchesSearch;
            });

            if (currentChosung !== 'all' && currentChosung !== 'A-Z' && currentChosung !== '기타') {
                filtered.sort((a, b) => {
                    const aFirst = getChosung(a.title) === currentChosung;
                    const bFirst = getChosung(b.title) === currentChosung;
                    
                    if (aFirst && !bFirst) return -1;
                    if (!aFirst && bFirst) return 1;
                    
                    return a.title.localeCompare(b.title, 'ko');
                });
            }

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(startIndex, startIndex + itemsPerPage);

            if (totalItems === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs">조건에 매칭되는 결과 항목이 없습니다.</div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const fragment = document.createDocumentFragment();
            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = "content-vis-auto bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col justify-between relative group hover:border-slate-350 transition-all duration-150 animate-card-in";
                
                const safeTitle = escapeHtml(item.title || item.name || '제목 없음');
                const imgUrl = escapeHtml(item.thumbnail || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=300');
                const safeCategory = escapeHtml(item.category === '외화' ? '외화(구형)' : (item.category || '미분류'));
                const statusMap = {
                    active: { label: '판권 유효', className: 'bg-emerald-50 text-emerald-700 border-emerald-200/80' },
                    expired: { label: '판권 만료', className: 'bg-red-50 text-red-700 border-red-200/80' },
                    bddvd: { label: 'BD/DVD 발매', className: 'bg-purple-50 text-purple-700 border-purple-200/80' },
                    vhs: { label: 'VHS 발매', className: 'bg-amber-50 text-amber-700 border-amber-200/80' }
                };
                const statusInfo = statusMap[item.status] || statusMap.expired;
                const statusBadge = `<span class="inline-flex items-center text-xs font-semibold px-2.5 py-1.5 rounded-lg border ${statusInfo.className}">${statusInfo.label}</span>`;
                const excavatedBadge = item.status !== 'active' && item.isExcavated
                    ? `<span class="inline-flex items-center text-xs font-bold px-2.5 py-1.5 rounded-lg border bg-blue-50 border-blue-200 text-blue-600">발굴</span>`
                    : '';

                let ottHtml = '';
                if (item.status === 'active') {
                    let ottLinksHtml = (item.ottLinks || []).map(link => {
                        const isLong = (link.name || '').length > 5;
                        const gridSpan = isLong ? 'col-span-2' : 'col-span-1';
                        return `
                            <a href="${escapeHtml(link.url)}" target="_blank" class="${gridSpan} bg-slate-50 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 text-slate-700 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-200 transition-all text-center block break-all whitespace-normal">
                                ${escapeHtml(link.name)} ↗
                            </a>
                        `;
                    }).join('');
                    ottHtml = `<div class="mt-2 pt-2 border-t border-slate-100">
                                <div class="grid grid-cols-2 gap-1.5 min-w-0">${ottLinksHtml}</div>
                               </div>`;
                } else {
                    const statusLabels = { bddvd: 'BD/DVD 매체 시청', vhs: 'VHS 비디오 시청', expired: '스트리밍 서비스 부재' };
                    const statusColors = { bddvd: 'text-purple-600/80', vhs: 'text-amber-600/80', expired: 'text-red-600/80' };
                    ottHtml = `<div class="mt-2 pt-2 border-t border-slate-100 text-xs ${statusColors[item.status]} font-semibold text-center py-1 bg-slate-50/50 rounded-lg border border-slate-100">${statusLabels[item.status]}</div>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="relative aspect-[2/3] w-full bg-slate-50 overflow-hidden">
                            <img src="${imgUrl}" loading="lazy" decoding="async" alt="${safeTitle}" class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=300'">
                            <span class="absolute top-1.5 left-1.5 bg-white/90 backdrop-blur-md text-xs px-2 py-1 rounded-lg text-slate-700 border border-slate-200 z-10 font-medium">${safeCategory}</span>
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold text-slate-800 text-sm w-full min-h-[2.75rem] leading-snug line-clamp-2 py-1">${safeTitle}</h3>
                            <div class="mt-1.5 flex items-center gap-1.5">${statusBadge}${excavatedBadge}</div>
                        </div>
                    </div>
                    <div class="p-3 pt-0">${ottHtml}</div>
                `;
                fragment.appendChild(card);
            });
            grid.innerHTML = '';
            grid.appendChild(fragment);
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';
            
            if (totalPages <= 1) return;

            const groupSize = 10;
            const currentGroup = Math.ceil(currentPage / groupSize);
            const startPage = (currentGroup - 1) * groupSize + 1;
            const endPage = Math.min(currentGroup * groupSize, totalPages);

            if (currentGroup > 1) {
                paginationContainer.appendChild(createPageButton(startPage - 1, '<<', false, '이전 10페이지'));
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationContainer.appendChild(createPageButton(i, i, i === currentPage));
            }

            if (endPage < totalPages) {
                paginationContainer.appendChild(createPageButton(endPage + 1, '>>', false, '다음 10페이지'));
            }
        }

        function createPageButton(page, label, isActive = false, title = '') {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerText = label;
            if (title) btn.title = title;
            btn.onclick = () => {
                currentPage = page;
                renderData();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            
            if (isActive) {
                btn.className = "w-8 h-8 rounded-lg bg-blue-600 text-white text-xs font-bold border border-blue-600 cursor-default z-10";
            } else {
                btn.className = "w-8 h-8 rounded-lg bg-slate-100 border border-slate-200 text-slate-600 text-xs font-medium hover:bg-slate-200 hover:text-slate-800 transition-all cursor-pointer";
            }
            return btn;
        }

        // ==================== [파트 2: 더빙 오프닝 아카이브 로직] ====================
        const GITHUB_OPENINGS_URL = "https://raw.githubusercontent.com/lsaac55151/kr-anime-song/refs/heads/main/list.json";
        
        let SINGER_DATA = [];
        let SONG_DATA = [];
        let currentViewMode = 'singer';
        let openingsSearchTimeout = null;

        const themeColors = {
            pink: { bg: 'bg-pink-50 text-pink-700 border-pink-200' },
            blue: { bg: 'bg-blue-50 text-blue-700 border-blue-200' },
            yellow: { bg: 'bg-yellow-50 text-yellow-700 border-yellow-200' },
            purple: { bg: 'bg-purple-50 text-purple-700 border-purple-200' },
            green: { bg: 'bg-emerald-50 text-emerald-700 border-emerald-200' }
        };

        async function forceRefreshOpenings() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin'); 
            await fetchGitHubOpeningsData(); 
            setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }

        async function fetchGitHubOpeningsData() {
            const statusBox = document.getElementById('openingsStatusMessage');
            const gridBox = document.getElementById('galleryGrid');
            
            try {
                gridBox.innerHTML = '';
                statusBox.classList.remove('hidden');
                statusBox.innerHTML = `<i class="ph-fill ph-spinner-gap animate-spin text-2xl text-indigo-500 mb-2 inline-block"></i><p class="text-slate-500 text-xs font-bold">오프닝 데이터를 불러오는 중...</p>`;
                
                const response = await fetch(`${GITHUB_OPENINGS_URL}?t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) throw new Error('데이터 로드 실패');
                
                let rawData = await response.json();

                SINGER_DATA = rawData.map(s => {
                    if (s.works && !s.songs) {
                        return { ...s, songs: s.works.map((t, i) => ({ title: t, youtubeId: i === 0 ? (s.youtubeId || '') : '' })) };
                    }
                    return s;
                });

                processSongData(); 
                statusBox.classList.add('hidden');
                renderCurrentView();
            } catch (error) {
                statusBox.innerHTML = `<div class="inline-block p-6 bg-red-50 border border-red-200 rounded-xl"><h3 class="text-sm font-bold text-red-600">오프닝 데이터 로드 실패</h3></div>`;
            }
        }

        function processSongData() {
            let songMap = new Map();
            let dateCounter = Date.now(); 

            SINGER_DATA.forEach(singer => {
                if (!singer.songs) return;
                singer.songs.forEach(song => {
                    if(!song.title) return;
                    
                    const uniqueKey = song.youtubeId || song.title.toLowerCase().replace(/\s/g, '');
                    
                    if (!songMap.has(uniqueKey)) {
                        songMap.set(uniqueKey, {
                            key: uniqueKey,
                            title: song.title,
                            youtubeId: song.youtubeId,
                            category: song.category || 'etc',
                            singers: [],
                            date: dateCounter--
                        });
                    }
                    
                    const songEntry = songMap.get(uniqueKey);
                    if (!songEntry.singers.some(s => s.id === singer.id)) {
                        songEntry.singers.push({ id: singer.id, name: singer.name, theme: singer.theme });
                    }
                });
            });

            SONG_DATA = Array.from(songMap.values());
        }

        function switchViewMode(mode) {
            currentViewMode = mode;
            
            const tabBg = document.getElementById('tabBg');
            const btnSinger = document.getElementById('tabSinger');
            const btnSong = document.getElementById('tabSong');
            
            const singerFilter = document.getElementById('singerCategoryFilter');
            const songFilter = document.getElementById('songCategoryFilter');

                tabBg.style.transform = 'translateX(0)';

                songFilter.classList.add('hidden');

                btnSinger.className = "relative z-10 px-8 py-3 w-52 text-sm font-black text-slate-500 hover:text-slate-800 switch-transition cursor-pointer tracking-tight";
                singerFilter.classList.add('hidden');
                songFilter.classList.remove('hidden');
                songFilter.value = 'all';
            }
            
            document.getElementById('openingsSearchInput').value = '';
            renderCurrentView();

        function renderCurrentView() {
            const query = document.getElementById('openingsSearchInput').value.toLowerCase().trim();
            const sortBy = document.getElementById('sortSelect').value;
            const gridBox = document.getElementById('galleryGrid');
            
            const singerCatFilter = document.getElementById('singerCategoryFilter') ? document.getElementById('singerCategoryFilter').value : 'all';
            const songCatFilter = document.getElementById('songCategoryFilter') ? document.getElementById('songCategoryFilter').value : 'all';

            let filteredSingers = SINGER_DATA.filter(s => s.name.toLowerCase().includes(query) || (s.songs && s.songs.some(song => song.title.toLowerCase().includes(query))));
            let filteredSongs = SONG_DATA.filter(s => s.title.toLowerCase().includes(query) || s.singers.some(singer => singer.name.toLowerCase().includes(query)));

            if (currentViewMode === 'singer' && singerCatFilter !== 'all') {
                if (singerCatFilter === 'voice_actor') {
                    filteredSingers = filteredSingers.filter(s => s.name.includes('(성우)'));
                } else if (singerCatFilter === 'singer') {
                    filteredSingers = filteredSingers.filter(s => !s.name.includes('(성우)'));
                }
            }

            if (currentViewMode === 'song' && songCatFilter !== 'all') {
                filteredSongs = filteredSongs.filter(s => s.category === songCatFilter);
            }

            document.getElementById('singerStatCount').textContent = filteredSingers.length;
            document.getElementById('songStatCount').textContent = filteredSongs.length;

            if (currentViewMode === 'singer') {
                if (sortBy === 'name') filteredSingers.sort((a,b) => a.name.localeCompare(b.name));
                else filteredSingers.sort((a,b) => b.date - a.date); 
                
                gridBox.innerHTML = filteredSingers.map(createSingerCard).join('');
            } else {
                if (sortBy === 'name') filteredSongs.sort((a,b) => a.title.localeCompare(b.title));
                else filteredSongs.sort((a,b) => b.date - a.date); 
                
                gridBox.innerHTML = filteredSongs.map(createSongCard).join('');
            }
        }

                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/70 via-slate-900/10 to-transparent"></div>

                        <p class="text-slate-400 text-[10px] mb-3 line-clamp-2">${s.description || '상세 정보를 확인하세요.'}</p>
                        <div class="mt-auto bg-slate-100 rounded-lg p-2.5 border border-slate-200">
                            <ul class="w-full">${previewWorks}</ul>
                            ${(s.songs||[]).length>2?`<p class="text-[10px] text-center text-slate-400 mt-1.5 font-bold">+ ${(s.songs.length-2)}곡 더보기</p>`:''}

        function createSongCard(s) {
            const thumbUrl = s.youtubeId ? `https://img.youtube.com/vi/${s.youtubeId}/hqdefault.jpg` : 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=640';
            
            const categories = { 'anime_kids': '애니 (아동용)', 'anime_sub': '애니 (서브)', 'game': '게임 OST', 'drama': '드라마', 'cover': '개인 커버', 'etc': '그 외' };
            const categoryLabel = categories[s.category] || '그 외';

            const singerTags = s.singers.slice(0, 3).map(singer => {
                return `<span class="inline-flex items-center px-2.5 py-1 text-[10px] font-bold bg-slate-100 text-slate-800 rounded-md border border-slate-200 truncate max-w-[85px]">${singer.name}</span>`;
            }).join('');
            
            const extraSingers = s.singers.length > 3 ? `<span class="text-[10px] font-bold text-slate-400 px-0.5">+${s.singers.length - 3}</span>` : '';

            return `
                <div class="group relative flex flex-col bg-white border border-slate-200 rounded-2xl overflow-hidden hover:border-slate-350 transition-all duration-300 animate-slide-up cursor-pointer" onclick="openSongDetailModal('${s.key}')">
                    <div class="relative pt-[56.25%] overflow-hidden bg-slate-900 shrink-0">
                        <img src="${thumbUrl}" loading="lazy" decoding="async" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 opacity-70 group-hover:opacity-100 transition-all duration-500" onerror="this.src='https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=640'">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/20">
                            <div class="w-10 h-10 bg-red-658 rounded-full flex items-center justify-center shadow-md transform scale-90 group-hover:scale-100 transition-transform bg-red-600"><i class="ph-fill ph-play text-white text-sm ml-0.5"></i></div>
                        </div>
                        
                        <!-- 카테고리 배지 -->
                        <div class="absolute top-2.5 left-2.5 z-30">
                            <span class="bg-white/90 text-slate-700 border border-slate-200 backdrop-blur-md text-[9px] font-bold px-2 py-1 rounded-lg shadow-xs text-center">${categoryLabel}</span>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col flex-grow bg-white">
                        <div class="flex items-start gap-1.5 mb-3 flex-grow">
                            <i class="ph-fill ph-music-notes text-indigo-500 mt-0.5 shrink-0 text-xs"></i>
                            <h3 class="font-bold text-xs text-slate-800 line-clamp-2 leading-snug">${s.title}</h3>
                        </div>
                        <div class="mt-auto border-t border-slate-100 pt-2.5">
                            <p class="text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Sung By</p>
                            <div class="flex flex-wrap gap-1 items-center">
                                ${singerTags} ${extraSingers}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        const playerModal = document.getElementById('playerModal');
        playerModal.addEventListener('click', (e) => { if (e.target === playerModal) closeModal('playerModal'); });

        function openSingerModal(id) {
            const s = SINGER_DATA.find(x => x.id === id);
            if (!s) return;

            document.getElementById('playerTitle').textContent = s.name;
            document.getElementById('playerDesc').textContent = s.description || "기록된 추억이 없습니다.";
            
            let songHtml = (s.songs || []).map((song, idx) => {
                const thumbUrl = song.youtubeId ? `https://img.youtube.com/vi/${song.youtubeId}/hqdefault.jpg` : 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=640';
                const clickable = song.youtubeId ? `onclick="window.open('https://www.youtube.com/watch?v=${song.youtubeId}', '_blank')"` : '';
                const pointerClass = song.youtubeId ? 'cursor-pointer hover:border-slate-350' : 'opacity-70 grayscale';
                
                return `
                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all duration-300 group flex flex-col ${pointerClass}">
                    <div class="relative pt-[56.25%] bg-slate-900 overflow-hidden" ${clickable}>
                        <img src="${thumbUrl}" loading="lazy" decoding="async" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-103 transition-all duration-300">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/20">
                            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center shadow-md scale-90 group-hover:scale-100"><i class="ph-fill ph-play text-white ml-0.5 text-sm"></i></div>
                        </div>
                    </div>
                    <div class="p-3.5 flex items-start justify-between gap-3 bg-white flex-grow">
                        <span class="font-bold text-xs leading-snug line-clamp-2 mt-0.5 text-slate-800">${song.title}</span>
                    </div>
                </div>`
            }).join('');

            document.getElementById('songListContainer').innerHTML = songHtml;
            playerModal.classList.replace('hidden', 'flex');
        }

        const detailModal = document.getElementById('songDetailModal');
        detailModal.addEventListener('click', (e) => { if (e.target === detailModal) closeModal('songDetailModal'); });

        function openSongDetailModal(key) {
            const s = SONG_DATA.find(x => x.key === key);
            if (!s) return;

            document.getElementById('songDetailTitle').textContent = s.title;
            
            const thumbImg = document.getElementById('songDetailThumb');
            const playBtn = document.getElementById('songDetailPlayBtn');
            const thumbWrapper = document.getElementById('songDetailThumbWrapper');
            
            if (s.youtubeId) {
                thumbImg.src = `https://img.youtube.com/vi/${s.youtubeId}/hqdefault.jpg`;
                
                const playAction = `window.open('https://www.youtube.com/watch?v=${s.youtubeId}', '_blank')`;
                playBtn.setAttribute('onclick', playAction);
                thumbWrapper.setAttribute('onclick', playAction);
                
                playBtn.classList.remove('hidden');
                thumbWrapper.classList.remove('opacity-70', 'grayscale', 'cursor-default');
                thumbWrapper.classList.add('cursor-pointer', 'group');
            } else {
                thumbImg.src = 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=1200';
                playBtn.classList.add('hidden');
                thumbWrapper.removeAttribute('onclick');
                thumbWrapper.classList.remove('cursor-pointer', 'group');
                thumbWrapper.classList.add('opacity-70', 'grayscale', 'cursor-default');
            }

            const singersHtml = s.singers.map(singer => {
                return `
                    <div class="flex items-center gap-3 bg-slate-100 border border-slate-200 p-2.5 px-4 rounded-xl">
                        <span onclick="closeModal('songDetailModal'); openSingerModal(${singer.id});" class="font-bold text-sm cursor-pointer hover:text-indigo-600 transition-colors text-slate-800">${singer.name}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('songDetailSingers').innerHTML = singersHtml;
            detailModal.classList.replace('hidden', 'flex');
        }
        
        // 오프닝용 실시간 검색 이벤트 바인딩
        document.getElementById('openingsSearchInput').addEventListener('input', e => {
            if (openingsSearchTimeout) clearTimeout(openingsSearchTimeout);
            openingsSearchTimeout = setTimeout(() => {
                renderCurrentView();
            }, 250);
        });

        // 초기 데이터 로드 (첫 화면인 'rights'의 판권 데이터부터 패치)
        fetchData();

</script>
</body>
</html>
